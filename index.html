<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScheduleMe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: 'Segoe UI', 'Sarabun', system-ui, sans-serif;
    background: linear-gradient(135deg, #eef2ff 0%, #fdf2f8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #ffffff;
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  }
  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .logo-wrap img {
    height: 64px;
    width: auto;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.08));
  }
  .icon {
    font-size: 56px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 28px;
    color: #1e293b;
    margin-bottom: 8px;
  }
  h1 span { color: #6366f1; }
  p {
    color: #64748b;
    font-size: 15px;
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    padding: 14px 32px;
    border-radius: 14px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 8px 20px rgba(99,102,241,0.35);
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(99,102,241,0.45);
  }
  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: #94a3b8;
  }
</style>
</head>
